name: BallparkMatchups
options:
  bundleIdPrefix: com.nick
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

targets:
  BallparkMatchups:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BallparkMatchups
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Resources/venues.json
      - path: Resources/situationCodes.json
    info:
      path: BallparkMatchups/Info.plist
      properties:
        CFBundleDisplayName: BallparkMatchups
        CFBundleIdentifier: com.nick.BallparkMatchups
        NSLocationWhenInUseUsageDescription: "To detect which ballpark you're at and show the current matchup."
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nick.BallparkMatchups
        DEVELOPMENT_TEAM: ""
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
